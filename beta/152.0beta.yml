release:
  release_date: '2026-05-21'
  text: |
    **These notes apply to Thunderbird version 152 beta 2 released May 27, 2026.**

    **System Requirements:** [Details](/en-US/thunderbird/146.0beta/system-requirements/)

    - Windows: Windows 10 or later
    - Mac: macOS 10.15 or later
    - Linux: GTK+ 3.14 or higher

  import_system_requirements: 140.0beta

  groups:
    - ' '
    - 'Fixed in beta 2'

notes:
  # New
  - note: SecurityDevices enabled in enterprise policies
    tag: new
    bugs: [1580753]
  - note: One-click account setup for Thundermail accounts
    tag: new
    bugs: [2033654]

  # Changed
  - note: "Use 'Add' instead of 'New' for account, calendar, address book creation buttons"
    tag: changed
    bugs: [1993849]
  - note: GMail OAuth updated to use PKCE
    tag: changed
    bugs: [2033048]
  - note: Hostname of mail server is also checked when detecting address books and calendars
    tag: changed
    bugs: [1988154]
  - note: Updated about:rights to replace local with hosted url
    tag: changed
    bugs: [2030386]
  - note: "'Hide completed tasks' now also hides cancelled tasks"
    tag: changed
    bugs: [382363]

  # Fixed
  - note: New mail alerts appeared on wrong monitor in three-monitor setup
    tag: fixed
    bugs: [2034322]
  - note: Spam messages triggered new mail notifications before being moved to Spam folder
    tag: fixed
    bugs: [1953623]
  - note: Filtered IMAP or NNTP subscriptions were lost after closing Subscribe dialog
    tag: fixed
    bugs: [2034737]
  - note: "'Download Headers' dialog for newsgroups failed to open"
    tag: fixed
    bugs: [2034443]
  - note: Messages nested deeper than 255 levels disappeared from threading view
    tag: fixed
    bugs: [1772455]
  - note: Performing Delete followed by Undo on thread parent message could corrupt view
    tag: fixed
    bugs: [671497]
  - note: Single messages still appeared collapsible after thread members were deleted
    tag: fixed
    bugs: [1913385]
  - note: Updated threads remained misordered until folder refresh or resort
    tag: fixed
    bugs: [1649402]
  - note: "Non-threaded subject sorting separated 'RE:' replies from original messages"
    tag: fixed
    bugs: [2037733]
  - note: BCC recipients were included in signed email headers
    tag: fixed
    bugs: [2037358]
  - note: Performance issue when decrypting encrypted messages
    tag: fixed
    bugs: [2001803]
  - note: Filter search on Body missed draft messages containing German umlauts
    tag: fixed
    bugs: [521649]
  - note: Thunderbird could crash during local message search
    tag: fixed
    bugs: [2039883]
  - note: "Blocked file warning showed without 'Unblock File' button in compose window"
    tag: fixed
    bugs: [2031995]
  - note: Compose window closed early and send progress dialog hung after NNTP failure
    tag: fixed
    bugs: [2034749]
  - note: Pasting contact photos stopped working when photo button had focus
