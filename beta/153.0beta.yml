release:
  release_date: '2026-06-17'
  text: |
    **These notes apply to Thunderbird version 153 beta 4 released June 29, 2026.**

    **System Requirements:** [Details](/en-US/thunderbird/146.0beta/system-requirements/)

    - Windows: Windows 10 or later
    - Mac: macOS 10.15 or later
    - Linux: GTK+ 3.14 or higher

  import_system_requirements: 140.0beta

  groups:
    - ' '
    - 'Fixed in beta 2'
    - 'Fixed in beta 3'
    - 'Fixed in beta 4'

notes:
  # New
  - note: Unified folders now display account color indicator with account name tooltip
    tag: new
    bugs: [1882368]
  - note: Added Proton Mail key server and WKD key discovery for Proton domains
    tag: new
    bugs: [1998102]
  - note: OAuth login for mail accounts now opens in default web browser
    tag: new
    bugs: [2024728]
  - note: Thundermail services can now be used without installing an add-on
    tag: new
    bugs: [2024728]
  - note: OAuth responses now verify issuer fields and reject missing required issuers
    tag: new
    bugs: [2044463]

  # Changed
  - note: Removed Odnoklassniki chat setup and directed users to XMPP configuration
    tag: changed
    bugs: [2044769]

