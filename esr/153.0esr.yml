release:
  release_date: '2026-07-21'
  text: |
    **For help and a quick start on Thunderbird 153, see
    [Thunderbird 153 Meadow FAQ](https://support.mozilla.org/en-US/kb/new-thunderbird-desktop)**

    **For more on all the new features in Thunderbird 153, see
    [What’s New in Thunderbird 153](https://www.thunderbird.net/thunderbird/153.0/whatsnew/).**

    **System Requirements:** [Details](/en-US/thunderbird/153.0esr/system-requirements/)

    - Windows: Windows 10 or later
    - Mac: macOS 10.15 or later
    - Linux: GTK+ 3.14 or higher

  system_requirements: |
    ## Windows
    - Windows 10 or later

    ### Windows Recommended Hardware
    - 1GHz or faster Intel/AMD compatible processor
    - 1GB RAM / 2GB of RAM for the 64-bit version
    - 500 MB hard drive space
    - additional hard drive space for mail storage

    ---

    ## Mac
    - macOS 10.15 or later

    ### Mac Recommended Hardware
    - Macintosh computer with an Intel x86 or Apple Silicon processor
    - 512 MB RAM
    - 200 MB hard drive space
    - additional hard drive space for mail storage

    ---

    ## GNU/Linux
    ### Software Requirements

    *Please note that GNU/Linux distributors may provide packages for your distribution which have
    different requirements.*

    - Thunderbird will not run at all without the following libraries or packages:
        - glibc 2.17 or higher
        - GTK+ 3.14 or higher
        - libglib 2.42 or higher
        - libstdc++ 4.8.1 or higher
        - X.Org 1.0 or higher (1.7 or higher is recommended)

    - For optimal functionality, we recommend the following libraries or packages:
        - DBus 1.0 or higher
        - NetworkManager 0.7 or higher
        - PulseAudio

