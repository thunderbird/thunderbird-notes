    pull_requests: [10333]
    issues: [10335]
    tag: new
  - note: Foldable device support with split-screen
    short_note: Foldable device support
    pull_requests: [10358]
    issues: [9760]
    tag: new
  - note: Email messages can be printed
    short_note: Email messages can be printed
    pull_requests: [10207]
    issues: [10216]
    tag: new
  - note: Unified folder account indicator identifies message ownership
    short_note: Unified folder account indicator
    pull_requests: [10205]
    issues: [10083]
    tag: new
  - note: Display account avatar in message notifications
    short_note: Display account avatar in message notifications
    pull_requests: [9652]
    issues: [7089]
    tag: new

