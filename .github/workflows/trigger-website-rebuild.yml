name: Trigger website rebuild

on:
  push:
    branches: [master, prod]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: app-token
        with:
          app-id: ${{ secrets.WEBSITE_BUILD_APP_ID }}
          private-key: ${{ secrets.WEBSITE_BUILD_KEY }}
          owner: thunderbird
          repositories: thunderbird-website

      - uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: thunderbird/thunderbird-website
          event-type: ${{ github.ref_name == 'prod' && 'prod' || 'stage' }}
          client-payload: '{"message": "thunderbird-notes ${{ github.ref_name }} push"}'
