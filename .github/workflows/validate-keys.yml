name: Validate Notes Keys

on:
  pull_request:
    paths:
      - 'android_beta/*.yml'
      - 'android_release/*.yml'
      - 'beta/*.yml'
      - 'esr/*.yml'
      - 'release/*.yml'
      - 'tools/validate_notes_keys.py'
      - '.github/workflows/validate-keys.yml'
  push:
    branches:
      - master
    paths:
      - 'android_beta/*.yml'
      - 'android_release/*.yml'
      - 'beta/*.yml'
      - 'esr/*.yml'
      - 'release/*.yml'
      - 'tools/validate_notes_keys.py'
      - '.github/workflows/validate-keys.yml'

permissions:
  contents: read

jobs:
  validate:
    name: Validate `notes` keys
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Validate YAML notes keys
        run: |
          python tools/validate_notes_keys.py
